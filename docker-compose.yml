services:
  ros_noetic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biomass_sim_resources_dev
    stdin_open: true
    tty: true
    working_dir: /catkin_ws
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_DISABLE_REQUIRE=1
    volumes:
      - ./:/catkin_ws/src/biomass-simulation-resources
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    network_mode: host
    privileged: true
    command: bash
